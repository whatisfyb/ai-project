# 项目配置文件
# 此文件包含敏感信息，已在 .gitignore 中忽略

# LLM 模型配置
llm:
  models:
    - name: qwen
      model: qwen/qwen3.6-plus:free
      api_key: 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
      base_url: https://openrouter.ai/api/v1
      temperature: 0.7
      timeout: 120

# Embedding 配置 (本地 sentence-transformers 模型)
embedding:
  model: shibing624/text2vec-base-chinese
  dimension: 768

# Text Splitter Configuration
splitter:
  use_legacy: false
  chunk_size: 1000
  chunk_overlap: 200
  soft_max_chars: 3000
  semantic_threshold_percentile: 25
  min_chunk_chars: 100
  extractive_summary: true

