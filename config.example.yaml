# AI Project 配置文件示例
# 复制此文件为 config.yaml 并填入实际值

# ============ LLM 模型配置 ============
llm:
  models:
    # 主模型（默认使用第一个）
    - name: default
      model: gpt-4o
      api_key: sk-xxx
      base_url: https://api.openai.com/v1
      temperature: 0.7
      timeout: 120
      context_window: 128K      # 支持 K/M 单位，如 200K, 1M
      max_output_tokens: 8K

    # 可选：添加更多模型
    # - name: claude
    #   model: claude-3-opus
    #   api_key: sk-xxx
    #   base_url: https://api.anthropic.com/v1
    #   temperature: 0.7
    #   timeout: 120
    #   context_window: 200K
    #   max_output_tokens: 8K

# ============ Embedding 配置 ============
embedding:
  api_key: sk-xxx
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: text-embedding-v4
  dimension: 1536

# ============ Tavily 搜索配置 ============
tavily:
  api_key: tvly-xxx

# ============ Firecrawl 配置 ============
firecrawl:
  api_key: fc-xxx

# ============ LangSmith 配置（可选）============
langsmith:
  api_key: lsv2_pt_xxx
  tracing: false
  project: default

# ============ 上下文压缩配置 ============
compact:
  auto_enabled: true        # 是否启用自动压缩
  threshold_pct: 0.80       # 触发阈值（80% 时触发）
  buffer_tokens: 10K        # 缓冲区 tokens（支持 K/M 单位）
  output_reserve: 8K        # 输出预留 tokens（支持 K/M 单位）

  # 分割模式
  use_token_budget: true    # 是否使用 Token 预算模式（推荐）
  tail_budget_ratio: 0.20   # 尾部 Token 预算比例（相对于有效上下文窗口）
  keep_recent: 10           # 保留最近消息数（仅当 use_token_budget=false 时生效）

  # 微压缩配置
  micro_compact:
    enabled: true           # 是否启用微压缩（清理旧工具结果）
    keep_recent: 5          # 微压缩保留最近 N 个工具结果

  # 断路器配置（防止无效压缩循环）
  circuit_breaker:
    enabled: true           # 是否启用断路器
    min_savings_pct: 0.10   # 最低节省比例（低于此值视为无效压缩）
    consecutive_failures: 2 # 连续 N 次无效压缩则触发断路器
    reset_after_seconds: 300 # 断路器自动重置时间（秒）

# ============ A2A 外部 Agent 配置 ============
# 配置外部 A2A Agent 的连接信息
a2a:
  agents:
    # 示例：配置一个研究分析 Agent
    # research-agent:
    #   url: "http://localhost:8001"
    #   description: "研究分析 Agent"
    #   api_key: "your-api-key"  # 可选

# ============ MCP Server 配置 ============
# Model Context Protocol servers for tool integration
mcp:
  servers:
    # Transport types:
    # - http: Standard HTTP JSON-RPC
    # - sse: Server-Sent Events
    # - streamable: Streamable HTTP (SSE response with JSON-RPC)

    # Example: Tavily MCP Server (streamable HTTP)
    # tavily:
    #   transport: streamable
    #   url: https://mcp.tavily.com/mcp/?tavilyApiKey=your-api-key
    #   enabled: true
    #   timeout: 60

    # Example: filesystem server (SSE)
    # filesystem:
    #   transport: sse
    #   url: http://localhost:8080
    #   enabled: true
    #   timeout: 30

    # Example: postgres server with auth (HTTP)
    # postgres:
    #   transport: http
    #   url: http://localhost:8081/mcp
    #   enabled: false
    #   timeout: 30
    #   headers:
    #     Authorization: Bearer xxx
